services:
  api:
    build: ./api
    container_name: glpi-consumibles-api
    environment:
      GLPI_BASE_URL: "https://glpi.akron.com.ar"
      GLPI_APP_TOKEN: ${GLPI_APP_TOKEN:?GLPI_APP_TOKEN not set}
      GLPI_USER_TOKEN: ${GLPI_USER_TOKEN:?GLPI_USER_TOKEN not set}
      PORT: "3000"
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - glpi_net

  frontend:
    image: nginx:alpine
    container_name: glpi-consumibles-frontend
    depends_on:
      - api
    ports:
      - "8085:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    # Usamos la configuración definida abajo
    configs:
      - source: nginx_conf_v1
        target: /etc/nginx/conf.d/default.conf
    restart: unless-stopped
    networks:
      - glpi_net

networks:
  glpi_net:
    driver: bridge

configs:
  nginx_conf_v1:
    content: |
      server {
          listen 80;
          server_name _;

          location / {
              root /usr/share/nginx/html;
              try_files $uri /index.html;
          }

          location /api/ {
              proxy_pass http://api:3000;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
          }
      }