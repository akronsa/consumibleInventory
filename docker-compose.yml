version: "3.8"

services:
  api:
    build: ./api
    container_name: glpi-consumibles-api
    environment:
      GLPI_BASE_URL: "https://glpi.akron.com.ar"
      GLPI_APP_TOKEN: "PONER_APP_TOKEN"
      GLPI_USER_TOKEN: "PONER_USER_TOKEN"
      PORT: "3000"
    restart: unless-stopped
    expose:
      - "3000"

frontend:
  image: nginx:alpine
  container_name: glpi-consumibles-frontend
  depends_on:
    - api
  ports:
    - "8080:80"
  volumes:
    - ./frontend:/usr/share/nginx/html:ro
    - ./nginx:/etc/nginx/conf.d:ro
  restart: unless-stopped