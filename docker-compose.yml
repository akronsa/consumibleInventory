version: "3.8"

services:
  api:
    build: ./api
    container_name: glpi-consumibles-api
    environment:
      GLPI_BASE_URL: "https://glpi.akron.com.ar"
      GLPI_APP_TOKEN: "PONER_APP_TOKEN"
      GLPI_USER_TOKEN: "PONER_USER_TOKEN"
      PORT: "3000"
    restart: unless-stopped
    expose:
      - "3100"

  frontend:
    image: nginx:alpine
    container_name: glpi-consumibles-frontend
    depends_on:
      - api
    ports:
      - "8085:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    configs:
      - source: nginx_default_conf
        target: /etc/nginx/conf.d/default.conf
    restart: unless-stopped

  configs:
    nginx_default_conf:
      file: ./nginx/default.conf