version: '3.8'

services:
  glpi-middleware:
    build: .
    container_name: glpi_scanner_api
    # Le pasamos los nombres de los paquetes directamente a pip, adiós problemas de caché
    command: sh -c "pip install fastapi==0.104.1 uvicorn==0.24.0 requests==2.31.0 python-dotenv==1.0.1 && python -m uvicorn main:app --host 0.0.0.0 --port 5000"
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - GLPI_BASE_URL=${GLPI_BASE_URL}
      - GLPI_CLIENT_ID=${GLPI_CLIENT_ID}
      - GLPI_CLIENT_SECRET=${GLPI_CLIENT_SECRET}
      - GLPI_USERNAME=${GLPI_USERNAME}
      - GLPI_PASSWORD=${GLPI_PASSWORD}
    networks:
      - glpi_network

networks:
  glpi_network:
    driver: bridge