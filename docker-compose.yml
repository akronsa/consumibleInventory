services:
  api:
    build: ./api
    container_name: glpi-consumibles-api
    environment:
      GLPI_BASE_URL: "https://glpi.akron.com.ar"
      GLPI_APP_TOKEN: ${GLPI_APP_TOKEN:?GLPI_APP_TOKEN not set}
      GLPI_USER_TOKEN: ${GLPI_USER_TOKEN:?GLPI_USER_TOKEN not set}
      PORT: "3000"
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - glpi_net

  frontend:
    image: nginx:alpine
    container_name: glpi-consumibles-frontend
    depends_on:
      - api
    ports:
      - "8085:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      # Importante: Usamos la ruta relativa desde la raíz del repo
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - glpi_net

networks:
  glpi_net:
    driver: bridge