services:
  api:
    build: ./api
    container_name: glpi-consumibles-api
    environment:
      GLPI_BASE_URL: "https://glpi.akron.com.ar"
      GLPI_APP_TOKEN: ${GLPI_APP_TOKEN:?GLPI_APP_TOKEN missing}
      GLPI_USER_TOKEN: ${GLPI_USER_TOKEN:?GLPI_USER_TOKEN missing}
      PORT: "3000"
    restart: unless-stopped
    # Expose es correcto si Nginx actúa como proxy reverso
    expose:
      - "3000"
    networks:
      - glpi_net

  frontend:
      image: nginx:alpine
      container_name: glpi-consumibles-frontend
      depends_on:
        - api
      ports:
        - "8085:80"
      volumes:
        - ./frontend:/usr/share/nginx/html:ro
      configs:
        - source: nginx_config
          target: /etc/nginx/conf.d/default.conf
      restart: unless-stopped
      networks:
        - glpi_net

configs:
  nginx_config:
    file: ./nginx/default.conf

networks:
  glpi_net:
    driver: bridge
