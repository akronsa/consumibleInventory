<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Consumibles GLPI</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 16px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 12px; margin-bottom: 12px; }
    input { font-size: 18px; padding: 10px; width: 100%; box-sizing: border-box; }
    .row { display: grid; gap: 8px; }
    .small { font-size: 14px; color: #666; }
    .ok { color: #0a7; font-weight: 600; }
    .err { color: #c00; font-weight: 600; }
    ul { list-style: none; padding: 0; margin: 6px 0 0; border: 1px solid #ddd; border-radius: 10px; overflow: hidden; }
    li { padding: 10px; border-top: 1px solid #eee; background: #fff; cursor: pointer; }
    #productName { color: #0a7; font-weight: bold; margin-top: 5px; min-height: 1.2em; }
  </style>
</head>
<body>
  <h2>Salida de consumibles</h2>

  <div class="card row">
    <label>
      Usuario (buscar)
      <input id="userSearch" placeholder="Escribí username..." autocomplete="off" />
    </label>
    <div id="userPick" class="small">Sin usuario seleccionado.</div>
    <ul id="userList" hidden></ul>
  </div>

  <div class="card row">
    <label>
      Barcode (escaneá para asignar)
      <input id="barcode" placeholder="Escaneá el código..." autocomplete="off" inputmode="none" />
    </label>
    <div id="productName"></div>
    <div id="msg" class="small"></div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let selectedUser = null;
    let debounce = null;
    let barcodeDebounce = null;
    let lastCodeScanned = "";

    function setMsg(text, cls="small") {
      const el = $("msg");
      el.className = cls;
      el.textContent = text;
    }

    function setUser(user) {
      selectedUser = user;
      $("userPick").innerHTML = `Seleccionado: <b>${user.name}</b>`;
      $("userList").hidden = true;
      $("barcode").focus();
    }

    // Detección de producto (Visual)
    $("barcode").addEventListener("input", () => {
      const code = $("barcode").value.trim();
      if (code.length < 3) return;
      lastCodeScanned = code;
      clearTimeout(barcodeDebounce);
      barcodeDebounce = setTimeout(async () => {
        try {
          const r = await fetch(`/api/model/${encodeURIComponent(code)}`);
          if (r.ok) {
            const model = await r.json();
            $("productName").textContent = `Listo: ${model.name} ${model.stock !== undefined ? '(Stock: '+model.stock+')' : ''}`;
          }
        } catch (e) {}
      }, 150);
    });

    // Lógica de consumo
    async function consume() {
      if (!selectedUser) { setMsg("Seleccioná un usuario primero.", "err"); return; }
      const code = $("barcode").value.trim() || lastCodeScanned;
      if (!code) return;

      $("barcode").value = "";
      lastCodeScanned = "";
      setMsg("Procesando...", "small");

      try {
        const r = await fetch("/api/consume", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ user_id: selectedUser.id, barcode: code })
        });
        const j = await r.json();
        if (!r.ok) {
          setMsg(j.detail || "Error", "err");
        } else {
          setMsg(`ASIGNADO: ${j.model?.name} (Quedan: ${j.remaining})`, "ok");
          setTimeout(() => { if($("msg").className === "ok") setMsg(""); }, 3000);
        }
      } catch (e) { setMsg("Error de conexión", "err"); }
      finally { $("barcode").focus(); $("productName").textContent = ""; }
    }

    // El Enter del scanner dispara el proceso
    $("barcode").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        consume();
      }
    });

    // Buscador de usuarios
    $("userSearch").addEventListener("input", () => {
      const q = $("userSearch").value.trim();
      clearTimeout(debounce);
      if (q.length < 2) { $("userList").hidden = true; return; }
      debounce = setTimeout(async () => {
        const r = await fetch(`/api/users?q=${encodeURIComponent(q)}`);
        if (r.ok) {
          const data = await r.json();
          const ul = $("userList");
          ul.innerHTML = "";
          (data.results || []).forEach(u => {
            const li = document.createElement("li");
            li.textContent = u.name;
            li.addEventListener("click", () => setUser(u));
            ul.appendChild(li);
          });
          ul.hidden = false;
        }
      }, 300);
    });

    document.addEventListener("click", (e) => {
      if (e.target.tagName !== "INPUT" && e.target.tagName !== "LI") $("barcode").focus();
    });

    window.addEventListener("load", () => $("barcode").focus());
  </script>
</body>
</html>
